<!DOCTYPE html>
<html>
<head>
    <title>Nearest Stations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #667eea, #1e1e2f);
            font-family: "Segoe UI", system-ui, sans-serif;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 30px;
            perspective: 1200px;
        }

        .card {
            width: 280px;
            padding: 24px;
            border-radius: 18px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(18px);
            box-shadow:
                0 30px 60px rgba(0,0,0,0.35),
                inset 0 0 0 1px rgba(255,255,255,0.2);
            transform-style: preserve-3d;
            transition: transform 0.4s;
        }

        .card:hover {
            transform: rotateY(12deg) rotateX(6deg) scale(1.05);
        }

        h3 {
            margin-top: 0;
            text-align: center;
            letter-spacing: 0.6px;
        }

        .row {
            margin: 14px 0;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.25);
            text-align: center;
        }

        .label {
            font-size: 12px;
            opacity: 0.8;
        }

        .value {
            font-size: 16px;
            font-weight: 600;
            margin-top: 4px;
        }

        .distance {
            font-size: 22px;
            font-weight: 700;
            color: #42e695;
        }

        .back {
            position: fixed;
            bottom: 30px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            padding: 10px 18px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<div class="container">

    <!-- FROM STATION -->
    <div class="card">
        <h3>🚉 FROM</h3>

        <div class="row">
            <div class="label">Station Code</div>
            <div class="value">{{ from_station.code }}</div>
        </div>

        <div class="row">
            <div class="label">Station Name</div>
            <div class="value">{{ from_station.name }}</div>
        </div>

        <div class="row">
            <div class="label">Distance</div>
            <div class="distance">{{ from_station.distance_km }} km</div>
        </div>
    </div>

    <!-- TO STATION -->
    <div class="card">
        <h3>🏁 TO</h3>

        <div class="row">
            <div class="label">Station Code</div>
            <div class="value">{{ to_station.code }}</div>
        </div>

        <div class="row">
            <div class="label">Station Name</div>
            <div class="value">{{ to_station.name }}</div>
        </div>

        <div class="row">
            <div class="label">Distance</div>
            <div class="distance">{{ to_station.distance_km }} km</div>
        </div>
    </div>

</div>

<a href="/" class="back">⬅ Back</a>

</body>
</html>
